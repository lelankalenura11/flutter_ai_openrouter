name: flutter_ai_chat_app_openrouter
description: "A cross-platform multimodal AI chatbot using OpenRouter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  provider: ^6.1.2
  
  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.29
  sqlite3: ^2.4.7
  path: ^1.9.1
  path_provider: ^2.1.5
  
  # Secure storage for API key
  flutter_secure_storage: ^9.2.4
  
  # HTTP client
  http: ^1.3.0
  
  # UUID generation
  uuid: ^4.5.1
  
  # Intl for date formatting
  intl: ^0.20.2
  flutter_math_fork: ^0.7.4
  flutter_markdown: ^0.7.7+1
  image_picker: ^1.2.3
  file_picker: ">=10.2.0 <11.0.0"
  printing: ^5.15.0
  # Audio recording
  record: ^7.1.1

  # Video thumbnail extraction
  flutter_video_thumbnail_plus: ^1.0.6

  # Export/Import (Phase 6)
  archive: ^4.0.2
  share_plus: ^10.1.4
  desktop_drop: ^0.7.1
  window_manager: ^0.5.2
  google_fonts: ^8.2.0
  markdown: ^7.3.1
  scroll_to_index: ^3.0.1
  image: ^4.9.1
  html: ^0.15.6
  syncfusion_flutter_pdf: ^34.1.31
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Drift code generation
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true