name: flutter_ai_chat_app_openrouter
description: "A cross-platform multimodal AI chatbot using OpenRouter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  provider: ^6.1.2
  
  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.29
  sqlite3: ^2.4.7
  path: ^1.9.1
  path_provider: ^2.1.5
  
  # Secure storage for API key
  flutter_secure_storage: ^9.2.4
  
  # HTTP client
  http: ^1.3.0
  
  # UUID generation
  uuid: ^4.5.1
  
  # Intl for date formatting
  intl: ^0.20.2
  flutter_math_fork: ^0.7.4
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Drift code generation
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true